name: FFmpeg High Sierra (Osxcross Strict Fix)
on: [push, workflow_dispatch]

env:
  OSXCROSS_CACHE_VER: "v13"
  DEPS_CACHE_VER: "v13"
  OSXCROSS_ROOT: /home/runner/osxcross
  INSTALL_DIR: ${{ github.workspace }}/deps_dist
  MACOS_MIN_VER: "10.13"
  SDK_VERSION: "10.15"
  OSXCROSS_HOST: "x86_64-apple-darwin19"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev uuid-dev libssl-dev libbz2-dev zlib1g-dev nasm pkg-config make

      - name: Cache Osxcross
        id: cache-osxcross
        uses: actions/cache@v4
        with:
          path: ${{ env.OSXCROSS_ROOT }}
          key: osxcross-v13-${{ env.SDK_VERSION }}

      - name: Setup Osxcross
        if: steps.cache-osxcross.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/tpoechtrager/osxcross.git ${{ env.OSXCROSS_ROOT }}
          cd ${{ env.OSXCROSS_ROOT }}
          curl -L https://github.com/joseluisq/macosx-sdks/releases/download/${{ env.SDK_VERSION }}/MacOSX${{ env.SDK_VERSION }}.sdk.tar.xz -o tarballs/MacOSX${{ env.SDK_VERSION }}.sdk.tar.xz
          UNATTENDED=1 CC=clang CXX=clang++ ./build.sh

      - name: Export Path
        run: echo "${{ env.OSXCROSS_ROOT }}/target/bin" >> $GITHUB_PATH

      - name: Restore Deps Cache
        id: restore-deps
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.INSTALL_DIR }}
          key: deps-libs-v13

      - name: Build FDK-AAC
        run: |
          if [ -f "${{ env.INSTALL_DIR }}/lib/libfdk-aac.a" ]; then exit 0; fi
          git clone --depth 1 https://github.com/mstorsjo/fdk-aac
          cd fdk-aac && ./autogen.sh
          CC=o64-clang CXX=o64-clang++ AR=${{ env.OSXCROSS_HOST }}-ar AS=${{ env.OSXCROSS_HOST }}-as RANLIB=${{ env.OSXCROSS_HOST }}-ranlib \
          ./configure --host=x86_64-apple-darwin --prefix=${{ env.INSTALL_DIR }} --enable-static --disable-shared --with-example=no
          make -j$(nproc) install

      - name: Build LAME
        run: |
          if [ -f "${{ env.INSTALL_DIR }}/lib/libmp3lame.a" ]; then exit 0; fi
          curl -L https://downloads.sourceforge.net/project/lame/lame/3.100/lame-3.100.tar.gz | tar xz
          cd lame-3.100
          CC=o64-clang CXX=o64-clang++ AR=${{ env.OSXCROSS_HOST }}-ar AS=${{ env.OSXCROSS_HOST }}-as RANLIB=${{ env.OSXCROSS_HOST }}-ranlib \
          ./configure --host=x86_64-apple-darwin --prefix=${{ env.INSTALL_DIR }} --enable-static --disable-shared --disable-frontend
          make -j$(nproc) install

      - name: Build OPUS
        run: |
          if [ -f "${{ env.INSTALL_DIR }}/lib/libopus.a" ]; then exit 0; fi
          git clone --depth 1 https://github.com/xiph/opus
          cd opus && ./autogen.sh
          CC=o64-clang CXX=o64-clang++ AR=${{ env.OSXCROSS_HOST }}-ar AS=${{ env.OSXCROSS_HOST }}-as RANLIB=${{ env.OSXCROSS_HOST }}-ranlib \
          ./configure --host=x86_64-apple-darwin --prefix=${{ env.INSTALL_DIR }} --enable-static --disable-shared --disable-extra-programs --disable-doc
          make -j$(nproc) install

      - name: Build SVT-AV1
        run: |
          if [ -f "${{ env.INSTALL_DIR }}/lib/libSvtAv1Enc.a" ]; then exit 0; fi
          git clone --depth 1 https://gitlab.com/AOMediaCodec/SVT-AV1.git
          cd SVT-AV1
          # Возвращаем ВСЕ переменные обратно в команду, иначе toolchain.cmake падает
          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.OSXCROSS_ROOT }}/target/toolchain.cmake \
            -DOSXCROSS_TARGET_DIR=${{ env.OSXCROSS_ROOT }}/target \
            -DOSXCROSS_TARGET=${{ env.OSXCROSS_HOST }} \
            -DOSXCROSS_HOST=${{ env.OSXCROSS_HOST }} \
            -DOSXCROSS_SDK=MacOSX${{ env.SDK_VERSION }}.sdk \
            -DCMAKE_C_COMPILER=${{ env.OSXCROSS_HOST }}-clang \
            -DCMAKE_CXX_COMPILER=${{ env.OSXCROSS_HOST }}-clang++ \
            -DCMAKE_ASM_NASM_COMPILER=nasm \
            -DCMAKE_MAKE_PROGRAM=/usr/bin/make \
            -DCMAKE_INSTALL_PREFIX=${{ env.INSTALL_DIR }} \
            -DBUILD_SHARED_LIBS=OFF -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF -DBUILD_APPS=OFF \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=${{ env.MACOS_MIN_VER }}
          cmake --build build -j$(nproc) --target install

      - name: Save Deps Cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ${{ env.INSTALL_DIR }}
          key: deps-libs-v13

      - name: Build FFmpeg
        run: |
          git clone --depth 1 https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
          cd ffmpeg-src
          export PKG_CONFIG_LIBDIR="${{ env.INSTALL_DIR }}/lib/pkgconfig"
          ./configure \
            --prefix="${{ github.workspace }}/dist_ffmpeg" \
            --enable-cross-compile --cross-prefix=${{ env.OSXCROSS_HOST }}- \
            --target-os=darwin --arch=x86_64 --cc=o64-clang --cxx=o64-clang++ \
            --nm=${{ env.OSXCROSS_HOST }}-nm --ar=${{ env.OSXCROSS_HOST }}-ar \
            --enable-static --disable-shared --enable-gpl --enable-nonfree \
            --enable-libfdk-aac --enable-libmp3lame --enable-libopus --enable-libsvtav1 \
            --extra-cflags="-I${{ env.INSTALL_DIR }}/include" \
            --extra-ldflags="-L${{ env.INSTALL_DIR }}/lib" \
            --disable-doc
          make -j$(nproc) install

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-high-sierra
          path: dist_ffmpeg/bin/ffmpeg
