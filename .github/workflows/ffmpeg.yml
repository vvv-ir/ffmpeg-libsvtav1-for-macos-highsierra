name: Build FFmpeg for High Sierra
on: [push, workflow_dispatch]

jobs:
  build:
    # Используем macOS 13 (Intel), чтобы избежать проблем с кросс-компиляцией ARM -> x86
    runs-on: macos-13

    steps:
      - name: Checkout FFmpeg
        uses: actions/checkout@v4
        with:
          repository: FFmpeg/FFmpeg
          path: ffmpeg-src
          fetch-depth: 1

      - name: Install Build Tools
        run: |
          brew install pkg-config nasm automake libtool

      # ПРИМЕЧАНИЕ: Здесь должен быть ваш шаг сборки библиотек (SVT-AV1, Opus и т.д.)
      # Они должны оказаться в ${{ github.workspace }}/libs
      # Если они уже собираются, вставьте тот код сюда.

      - name: Build FFmpeg for High Sierra
        env:
          PKG_CONFIG_PATH: ${{ github.workspace }}/libs/lib/pkgconfig
        run: |
          cd ffmpeg-src
          
          # Настройка путей и флагов
          TARGET_FLAGS="-arch x86_64 -mmacosx-version-min=10.13"
          SDK_PATH=$(xcrun --sdk macosx --show-sdk-path)
          
          export CFLAGS="$TARGET_FLAGS -isysroot $SDK_PATH -I${{ github.workspace }}/libs/include"
          export LDFLAGS="$TARGET_FLAGS -isysroot $SDK_PATH -L${{ github.workspace }}/libs/lib -Wl,-platform_version,macos,10.13,10.13"
          
          ./configure \
            --prefix="${{ github.workspace }}/dist" \
            --extra-cflags="$CFLAGS" \
            --extra-ldflags="$LDFLAGS" \
            --cc="clang" \
            --host-cc="clang" \
            --target-os=darwin \
            --arch=x86_64 \
            --enable-cross-compile \
            --enable-static \
            --disable-shared \
            --enable-gpl \
            --enable-nonfree \
            --enable-libsvtav1 \
            --enable-libfdk-aac \
            --enable-libopus \
            --enable-libmp3lame \
            --pkg-config-flags="--static" \
            --disable-debug \
            --disable-doc \
            --extra-libs="-lpthread -lm -lz -ldl"

          echo "--- ПРОВЕРКА КОНФИГУРАЦИИ ---"
          # Проверяем, что кодеки включены в отчет
          if ! grep -E "libsvtav1|libfdk_aac|libopus" config.h > /dev/null; then
            echo "ОШИБКА: Кодеки не найдены в config.h. Проверьте пути к библиотекам."
            exit 1
          fi
          
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-high-sierra
          path: dist/bin/ffmpeg
