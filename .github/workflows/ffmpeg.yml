- name: Configure and Build FFmpeg
        run: |
          cd ffmpeg-src
          BP=$(brew --prefix)
          
          # СОЗДАЕМ ФЕЙКОВЫЙ PKG_CONFIG_PATH, чтобы он вел в нашу папку
          export PKG_CONFIG_PATH="$GITHUB_WORKSPACE/libs/lib/pkgconfig"
          
          # ЯВНО ГОВОРИМ ГДЕ ИСКАТЬ ПРОВЕРКУ
          ./configure \
            --prefix="$GITHUB_WORKSPACE/dist" \
            --enable-static \
            --disable-shared \
            --enable-gpl \
            --enable-nonfree \
            --disable-debug \
            --enable-libx264 \
            --enable-libx265 \
            --enable-libsvtav1 \
            --arch=x86_64 \
            --target-os=darwin \
            --pkg-config="pkg-config --static" \
            --extra-cflags="-I$GITHUB_WORKSPACE/libs/include -I$BP/include -mmacosx-version-min=10.13 -arch x86_64" \
            --extra-ldflags="-L$GITHUB_WORKSPACE/libs/lib -L$BP/lib -mmacosx-version-min=10.13 -arch x86_64" \
            --extra-libs="-lpthread -lm"
          
          make -j$(sysctl -n hw.ncpu)
          make install
