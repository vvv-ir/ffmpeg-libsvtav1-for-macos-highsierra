name: FFmpeg High Sierra (Osxcross Strict Ubuntu 22.04)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04 # КРИТИЧНО: используем 22.04 вместо latest
    env:
      OSXCROSS_ROOT: /home/runner/osxcross
      INSTALL_DIR: ${{ github.workspace }}/deps_dist
      MACOS_MIN_VER: "10.13"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Linux Build Tools & Host C++ Libs
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm-dev libxml2-dev uuid-dev libssl-dev \
            bash patch make tar xz-utils bzip2 gzip sed cpio libbz2-dev zlib1g-dev \
            cmake nasm pkg-config libc++-dev libc++abi-dev python3

      # --- КЭШИРОВАНИЕ ---
      - name: Cache Osxcross
        id: cache-osxcross
        uses: actions/cache@v4
        with:
          path: ${{ env.OSXCROSS_ROOT }}/target
          key: osxcross-ubuntu22-sdk10.15-v11

      - name: Setup Osxcross
        if: steps.cache-osxcross.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/tpoechtrager/osxcross.git ${{ env.OSXCROSS_ROOT }}
          cd ${{ env.OSXCROSS_ROOT }}
          mkdir -p tarballs
          # КРИТИЧНО: Используем специальный SDK, пропатченный для Linux-файловых систем
          curl -L https://github.com/joseluisq/macosx-sdks/releases/download/10.15/MacOSX10.15.sdk.tar.xz -o tarballs/MacOSX10.15.sdk.tar.xz
          
          # Жестко указываем использовать clang для сборки самого тулчейна
          export CC=clang
          export CXX=clang++
          UNATTENDED=1 ./build.sh

      - name: Export Path
        run: echo "${{ env.OSXCROSS_ROOT }}/target/bin" >> $GITHUB_PATH

      - name: Build FDK-AAC
        run: |
          mkdir -p ${{ env.INSTALL_DIR }}
          export PATH="${{ env.OSXCROSS_ROOT }}/target/bin:$PATH"
          
          # Задаем универсальные алиасы osxcross
          export CC="o64-clang"
          export CXX="o64-clang++"
          export MACOSX_DEPLOYMENT_TARGET=${{ env.MACOS_MIN_VER }}
          
          git clone --depth 1 https://github.com/mstorsjo/fdk-aac
          cd fdk-aac && ./autogen.sh
          
          # Флаг --host=x86_64-apple-darwin указывает скрипту, что мы кросс-компилируем
          ./configure \
            --host=x86_64-apple-darwin \
            --prefix=${{ env.INSTALL_DIR }} \
            --enable-static \
            --disable-shared || { cat config.log; exit 1; }
            
          make -j$(nproc) install
