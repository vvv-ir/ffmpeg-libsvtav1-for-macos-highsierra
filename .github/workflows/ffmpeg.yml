name: FFmpeg High Sierra (Osxcross Strict)
on: [push, workflow_dispatch]

env:
  OSXCROSS_CACHE_VER: "v11"
  DEPS_CACHE_VER: "v11"
  OSXCROSS_ROOT: /home/runner/osxcross
  INSTALL_DIR: ${{ github.workspace }}/deps_dist
  MACOS_MIN_VER: "10.13"
  SDK_VERSION: "10.15"
  # Пробрасываем эти переменные глобально для всех шагов
  OSXCROSS_TARGET_DIR: "/home/runner/osxcross/target"
  OSXCROSS_TARGET: "x86_64-apple-darwin19"
  OSXCROSS_HOST: "x86_64-apple-darwin19"
  OSXCROSS_SDK: "MacOSX10.15.sdk"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Linux Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm-dev libxml2-dev uuid-dev libssl-dev \
            bash patch make tar xz-utils bzip2 gzip sed cpio libbz2-dev zlib1g-dev \
            cmake nasm pkg-config libc++-dev libc++abi-dev python3

      - name: Cache Osxcross
        id: cache-osxcross
        uses: actions/cache@v4
        with:
          path: ${{ env.OSXCROSS_ROOT }}/target
          key: osxcross-ubuntu22-sdk${{ env.SDK_VERSION }}-${{ env.OSXCROSS_CACHE_VER }}

      - name: Setup Osxcross
        if: steps.cache-osxcross.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/tpoechtrager/osxcross.git ${{ env.OSXCROSS_ROOT }}
          cd ${{ env.OSXCROSS_ROOT }}
          mkdir -p tarballs
          curl -L https://github.com/joseluisq/macosx-sdks/releases/download/${{ env.SDK_VERSION }}/MacOSX${{ env.SDK_VERSION }}.sdk.tar.xz -o tarballs/MacOSX${{ env.SDK_VERSION }}.sdk.tar.xz
          UNATTENDED=1 CC=clang CXX=clang++ ./build.sh

      - name: Export Path
        run: echo "${{ env.OSXCROSS_ROOT }}/target/bin" >> $GITHUB_PATH

      - name: Restore Deps Cache
        id: restore-deps
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.INSTALL_DIR }}
          key: deps-libs-${{ env.DEPS_CACHE_VER }}-${{ runner.os }}

      - name: Build FDK-AAC
        run: |
          if [ -f "${{ env.INSTALL_DIR }}/lib/libfdk-aac.a" ]; then exit 0; fi
          git clone --depth 1 https://github.com/mstorsjo/fdk-aac
          cd fdk-aac && ./autogen.sh
          CC=o64-clang CXX=o64-clang++ ./configure --host=x86_64-apple-darwin --prefix=${{ env.INSTALL_DIR }} --enable-static --disable-shared --with-example=no
          make -j$(nproc) install

      - name: Build LAME
        run: |
          if [ -f "${{ env.INSTALL_DIR }}/lib/libmp3lame.a" ]; then exit 0; fi
          curl -L https://downloads.sourceforge.net/project/lame/lame/3.100/lame-3.100.tar.gz | tar xz
          cd lame-3.100
          CC=o64-clang CXX=o64-clang++ ./configure --host=x86_64-apple-darwin --prefix=${{ env.INSTALL_DIR }} --enable-static --disable-shared --disable-frontend
          make -j$(nproc) install

      - name: Build OPUS
        run: |
          if [ -f "${{ env.INSTALL_DIR }}/lib/libopus.a" ]; then exit 0; fi
          git clone --depth 1 https://github.com/xiph/opus
          cd opus && ./autogen.sh
          CC=o64-clang CXX=o64-clang++ ./configure --host=x86_64-apple-darwin --prefix=${{ env.INSTALL_DIR }} --enable-static --disable-shared --disable-extra-programs --disable-doc
          make -j$(nproc) install

      - name: Build SVT-AV1
        run: |
          if [ -f "${{ env.INSTALL_DIR }}/lib/libSvtAv1Enc.a" ]; then exit 0; fi
          git clone --depth 1 https://gitlab.com/AOMediaCodec/SVT-AV1.git
          cd SVT-AV1
          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.OSXCROSS_ROOT }}/target/toolchain.cmake \
            -DOSXCROSS_TARGET_DIR=${{ env.OSXCROSS_ROOT }}/target \
            -DOSXCROSS_TARGET=${{ env.OSXCROSS_TARGET }} \
            -DOSXCROSS_HOST=${{ env.OSXCROSS_HOST }} \
            -DOSXCROSS_SDK=${{ env.OSXCROSS_SDK }} \
            -DCMAKE_C_COMPILER=${{ env.OSXCROSS_HOST }}-clang \
            -DCMAKE_CXX_COMPILER=${{ env.OSXCROSS_HOST }}-clang++ \
            -DCMAKE_INSTALL_PREFIX=${{ env.INSTALL_DIR }} \
            -DBUILD_SHARED_LIBS=OFF -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF -DBUILD_APPS=OFF \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=${{ env.MACOS_MIN_VER }} -DCMAKE_MAKE_PROGRAM=/usr/bin/make
          cmake --build build -j$(nproc) --target install

      - name: Save Deps Cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ${{ env.INSTALL_DIR }}
          key: deps-libs-${{ env.DEPS_CACHE_VER }}-${{ runner.os }}

      - name: Build FFmpeg (Final)
        run: |
          git clone --depth 1 https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
          cd ffmpeg-src
          
          export PATH="${{ env.OSXCROSS_ROOT }}/target/bin:$PATH"
          export PKG_CONFIG_PATH="${{ env.INSTALL_DIR }}/lib/pkgconfig"
          export PKG_CONFIG_LIBDIR="${{ env.INSTALL_DIR }}/lib/pkgconfig"
          export PKG_CONFIG_SYSROOT_DIR="/"

          ./configure \
            --prefix="${{ github.workspace }}/dist_ffmpeg" \
            --enable-cross-compile \
            --cross-prefix=${{ env.OSXCROSS_HOST }}- \
            --target-os=darwin \
            --arch=x86_64 \
            --cc=o64-clang \
            --cxx=o64-clang++ \
            --nm=x86_64-apple-darwin19-nm \
            --ar=x86_64-apple-darwin19-ar \
            --as=x86_64-apple-darwin19-as \
            --strip=x86_64-apple-darwin19-strip \
            --enable-static \
            --disable-shared \
            --enable-gpl \
            --enable-nonfree \
            --enable-libfdk-aac \
            --enable-libmp3lame \
            --enable-libopus \
            --enable-libsvtav1 \
            --pkg-config-flags="--static" \
            --extra-cflags="-I${{ env.INSTALL_DIR }}/include -mmacosx-version-min=${{ env.MACOS_MIN_VER }}" \
            --extra-ldflags="-L${{ env.INSTALL_DIR }}/lib -mmacosx-version-min=${{ env.MACOS_MIN_VER }}" \
            --disable-doc || { 
              echo "--- CONFIG.LOG ERROR ---";
              cat ffbuild/config.log | grep -A 20 "failed to find libfdk_aac"; 
              exit 1; 
            }

          make -j$(nproc)
          make install

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-high-sierra
          path: dist_ffmpeg/bin/ffmpeg
