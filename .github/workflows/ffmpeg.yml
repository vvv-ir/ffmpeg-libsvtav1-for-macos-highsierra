name: Build Full Static FFmpeg (Total Independence)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      MACOSX_DEPLOYMENT_TARGET: "10.13"
    steps:
      - name: Install Base Tools
        # Добавляем всё необходимое для сборки из исходников
        run: brew install nasm cmake automake autoconf libtool

      - name: Build Libraries Statically (Intel)
        run: |
          SDK_PATH=$(xcrun --sdk macosx --show-sdk-path)
          FLAGS="-target x86_64-apple-macos10.13 -isysroot $SDK_PATH"
          PREFIX="$GITHUB_WORKSPACE/libs"
          mkdir -p $PREFIX

          # 1. FDK-AAC (теперь заведется)
          git clone --depth 1 https://github.com/mstorsjo/fdk-aac.git
          cd fdk-aac 
          ./autogen.sh
          ./configure --prefix=$PREFIX --enable-static --disable-shared --host=x86_64-apple-darwin CFLAGS="$FLAGS" CXXFLAGS="$FLAGS"
          make -j4 install
          cd ..

          # 2. LAME (MP3)
          curl -L https://downloads.sourceforge.net/project/lame/lame/3.100/lame-3.100.tar.gz | tar xz
          cd lame-3.100
          ./configure --prefix=$PREFIX --enable-static --disable-shared --host=x86_64-apple-darwin CFLAGS="$FLAGS"
          make -j4 install && cd ..

          # 3. OPUS
          git clone --depth 1 https://github.com/xiph/opus.git
          cd opus && ./autogen.sh
          ./configure --prefix=$PREFIX --enable-static --disable-shared --host=x86_64-apple-darwin CFLAGS="$FLAGS"
          make -j4 install && cd ..

          # 4. SVT-AV1 (уже проверенный)
          git clone --depth 1 https://gitlab.com/AOMediaCodec/SVT-AV1.git svt-src
          cd svt-src/Build
          cmake .. -G"Unix Makefiles" -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DCMAKE_C_FLAGS="$FLAGS" -DCMAKE_INSTALL_PREFIX=$PREFIX
          make -j4 install && cd ../..

      - name: Clone and Build FFmpeg
        run: |
          # Если папки нет - клонируем, если есть - идем дальше
          [ -d ffmpeg-src ] || git clone --depth 1 https://git.ffmpeg.org/ffmpeg.git ffmpeg-src
          cd ffmpeg-src
          
          SDK_PATH=$(xcrun --sdk macosx --show-sdk-path)
          
          # Указываем FFmpeg, где лежать "паспорта" наших собранных библиотек
          export PKG_CONFIG_PATH="$GITHUB_WORKSPACE/libs/lib/pkgconfig"
          
          ./configure \
            --prefix="$GITHUB_WORKSPACE/dist" \
            --enable-static \
            --disable-shared \
            --enable-gpl \
            --enable-nonfree \
            --arch=x86_64 \
            --target-os=darwin \
            --enable-cross-compile \
            --cc='clang -arch x86_64' \
            --extra-cflags="-target x86_64-apple-macos10.13 -isysroot $SDK_PATH -I$GITHUB_WORKSPACE/libs/include" \
            --extra-ldflags="-target x86_64-apple-macos10.13 -isysroot $SDK_PATH -L$GITHUB_WORKSPACE/libs/lib" \
            --disable-debug \
            --enable-libfdk-aac \
            --enable-libmp3lame \
            --enable-libopus \
            --enable-libsvtav1 \
            --extra-libs="-lpthread -lm -ldl -lz"
          
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-highsierra-ultimate
          path: dist/bin/ffmpeg
