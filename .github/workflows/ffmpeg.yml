name: Build Static FFmpeg (Cross-Compile Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      MACOSX_DEPLOYMENT_TARGET: "10.13"
    steps:
      - name: Install Tools
        run: brew install nasm x264 x265

      - name: Clone FFmpeg
        run: git clone --depth 1 https://git.ffmpeg.org/ffmpeg.git ffmpeg-src

      - name: Configure and Build
        run: |
          cd ffmpeg-src
          SDK_PATH=$(xcrun --sdk macosx --show-sdk-path)
          BP=$(brew --prefix)
          
          ./configure \
            --prefix="$GITHUB_WORKSPACE/dist" \
            --enable-static \
            --disable-shared \
            --enable-gpl \
            --enable-nonfree \
            --arch=x86_64 \
            --target-os=darwin \
            --enable-cross-compile \
            --cc='clang -arch x86_64' \
            --extra-cflags="-isysroot $SDK_PATH -mmacosx-version-min=10.13 -I$BP/include -I$GITHUB_WORKSPACE/libs/include" \
            --extra-ldflags="-isysroot $SDK_PATH -mmacosx-version-min=10.13 -L$BP/lib -L$GITHUB_WORKSPACE/libs/lib" \
            --disable-debug \
            --enable-libx264 \
            --enable-libx265 \
            --enable-libsvtav1 \
            --disable-pkg-config
          
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-intel-fixed
          path: dist/bin/ffmpeg
