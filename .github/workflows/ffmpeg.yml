# ╔════════════════════════════════════════════════════════════════════════════╗
# ║                     FFMPEG BUILDER ДЛЯ macOS 10.13                        ║
# ║                                                                            ║
# ║  Этот workflow собирает ПОЛНОФУНКЦИОНАЛЬНЫЙ FFmpeg с МАКСИМАЛЬНОЙ        ║
# ║  поддержкой ВСЕ кодеков для старых Mac'ов (High Sierra 10.13)            ║
# ║                                                                            ║
# ║  Что происходит:                                                          ║
# ║  1. 📦 Скачиваем и компилируем osxcross (кросс-компилятор)              ║
# ║  2. 🔨 Собираем ВСЕ необходимые библиотеки (либы) из исходников         ║
# ║  3. 🎬 Компилируем FFmpeg со ВСЕМИ либами                               ║
# ║  4. ⬆️  Загружаем готовый бинарь в артефакты                            ║
# ╚════════════════════════════════════════════════════════════════════════════╝

name: FFmpeg_HighSierra_Complete_Build_FULL
on: [push, workflow_dispatch]

# 🌍 ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
env:
  CACHE_REV: "v101"
  OSXCROSS_ROOT: /home/runner/osxcross
  OSXCROSS_TARGET_DIR: /home/runner/osxcross/target
  INSTALL_DIR: ${{ github.workspace }}/deps_dist
  MACOS_MIN_VER: "10.13"
  MACOSX_DEPLOYMENT_TARGET: "10.13"
  SDK_VERSION: "10.15"
  OSXCROSS_TARGET: "darwin19"
  OSXCROSS_HOST: "x86_64-apple-darwin19"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 1: Скачиваем исходный код проекта
      # ════════════════════════════════════════════════════════════════════════
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 2: Устанавливаем инструменты для сборки
      # ════════════════════════════════════════════════════════════════════════
      - name: 🔧 Install Build Tools
        run: |
          sudo apt-get update
          
          # Каждый пакет на новой строке с \ переносом
          sudo apt-get install -y \
            libxml2-dev \
            uuid-dev \
            libssl-dev \
            libbz2-dev \
            zlib1g-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libvorbis-dev \
            libtheora-dev \
            libspeex-dev \
            libogg-dev \
            libflac-dev \
            nasm \
            yasm \
            pkg-config \
            make \
            cmake \
            git \
            curl \
            wget \
            build-essential \
            automake \
            libtool

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 3А: Восстанавливаем osxcross из кэша
      # ════════════════════════════════════════════════════════════════════════
      - name: ♻️ Restore Osxcross Cache
        id: cache-osxcross
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.OSXCROSS_ROOT }}
          key: osxcross-${{ env.CACHE_REV }}-${{ env.SDK_VERSION }}
          restore-keys: |
            osxcross-${{ env.CACHE_REV }}-

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 3Б: Собираем osxcross (если кэша нет)
      # ════════════════════════════════════════════════════════════════════════
      - name: 🏗️ Setup Osxcross
        if: steps.cache-osxcross.outputs.cache-hit != 'true'
        run: |
          echo "🔨 Osxcross не в кэше, собираем..."
          rm -rf ${{ env.OSXCROSS_ROOT }}
          mkdir -p ${{ env.OSXCROSS_ROOT }}
          
          git clone https://github.com/tpoechtrager/osxcross.git ${{ env.OSXCROSS_ROOT }}
          cd ${{ env.OSXCROSS_ROOT }}
          
          mkdir -p tarballs
          
          echo "📥 Загружаем MacOSX 10.15 SDK..."
          if [ ! -f "tarballs/MacOSX${{ env.SDK_VERSION }}.sdk.tar.xz" ]; then
            curl -L \
              https://github.com/joseluisq/macosx-sdks/releases/download/${{ env.SDK_VERSION }}/MacOSX${{ env.SDK_VERSION }}.sdk.tar.xz \
              -o tarballs/MacOSX${{ env.SDK_VERSION }}.sdk.tar.xz \
              --retry 3 --retry-delay 5
          fi
          
          echo "🏗️ Собираем osxcross для darwin19..."
          UNATTENDED=1 \
          OSX_VERSION_MIN=${{ env.MACOS_MIN_VER }} \
          OSXCROSS_TARGET=${{ env.OSXCROSS_TARGET }} \
          CC=clang CXX=clang++ \
          ./build.sh 2>&1 | tail -50
          
          if [ ! -f "${{ env.OSXCROSS_TARGET_DIR }}/toolchain.cmake" ]; then
            echo "❌ ОШИБКА: toolchain.cmake не найден!"
            ls -la ${{ env.OSXCROSS_TARGET_DIR }}/
            exit 1
          fi
          
          echo "✅ Osxcross успешно собран"

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 3В: Сохраняем osxcross в кэш
      # ════════════════════════════════════════════════════════════════════════
      - name: 💾 Save Osxcross Cache
        if: always() && steps.cache-osxcross.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.OSXCROSS_ROOT }}
          key: osxcross-${{ env.CACHE_REV }}-${{ env.SDK_VERSION }}

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 4: Настраиваем переменные окружения для компилятора
      # ════════════════════════════════════════════════════════════════════════
      - name: ⚙️ Setup Toolchain Environment
        run: |
          # Путь к macOS SDK (операционная система для компиляции)
          export OSXCROSS_SDK=${{ env.OSXCROSS_TARGET_DIR }}/SDK/MacOSX10.15.sdk
          echo "OSXCROSS_SDK=$OSXCROSS_SDK" >> $GITHUB_ENV
          
          # Проверяем что SDK существует
          if [ ! -d "$OSXCROSS_SDK" ]; then
            echo "❌ SDK не найден в $OSXCROSS_SDK"
            echo "📂 Ищем какие SDK доступны:"
            find ${{ env.OSXCROSS_TARGET_DIR }} -name "*.sdk" -type d 2>/dev/null | head -10
            exit 1
          fi
          
          # Добавляем компилятор в PATH
          echo "${{ env.OSXCROSS_TARGET_DIR }}/bin" >> $GITHUB_PATH
          
          # Экспортируем переменные для следующих шагов
          echo "OSXCROSS_CONF=${{ env.OSXCROSS_TARGET_DIR }}/toolchain.cmake" >> $GITHUB_ENV
          echo "CC=${{ env.OSXCROSS_HOST }}-clang" >> $GITHUB_ENV
          echo "CXX=${{ env.OSXCROSS_HOST }}-clang++" >> $GITHUB_ENV
          echo "LD=${{ env.OSXCROSS_HOST }}-ld" >> $GITHUB_ENV
          echo "AR=${{ env.OSXCROSS_HOST }}-ar" >> $GITHUB_ENV
          echo "RANLIB=${{ env.OSXCROSS_HOST }}-ranlib" >> $GITHUB_ENV
          echo "STRIP=${{ env.OSXCROSS_HOST }}-strip" >> $GITHUB_ENV
          
          echo "✅ Toolchain готов"

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 5: Собираем все необходимые библиотеки
      # ════════════════════════════════════════════════════════════════════════
      - name: 📚 Build All Static Libraries (ПОЛНЫЙ НАБОР)
        run: |
          echo ""
          echo "╔═════════════════════════════════════════════════════════════╗"
          echo "║         🔨 НАЧИНАЕМ СБОРКУ ВСЕХ БИБЛИОТЕК 🔨              ║"
          echo "╚═════════════════════════════════════════════════════════════╝"
          echo ""
          
          mkdir -p ${{ env.INSTALL_DIR }}/lib/pkgconfig
          mkdir -p ${{ env.INSTALL_DIR }}/include
          
          # ══════════════════════════════════════════════════════════════════
          # 1️⃣ LIBOGG - БАЗОВАЯ ЗАВИСИМОСТЬ для vorbis и theora
          # ══════════════════════════════════════════════════════════════════
          if [ ! -f "${{ env.INSTALL_DIR }}/lib/libogg.a" ]; then
            echo ""
            echo "📦 [1/10] Собираем LIBOGG (базовая зависимость)..."
            rm -rf ogg
            git clone --depth 1 https://github.com/xiph/ogg.git ogg
            cd ogg
            ./autogen.sh
            ./configure \
              --host=${{ env.OSXCROSS_HOST }} \
              --prefix=${{ env.INSTALL_DIR }} \
              --enable-static --disable-shared \
              CC=${{ env.OSXCROSS_HOST }}-clang \
              CFLAGS="-mmacosx-version-min=${{ env.MACOS_MIN_VER }}" \
              LDFLAGS="-mmacosx-version-min=${{ env.MACOS_MIN_VER }}" \
              > /dev/null 2>&1
            make -j$(nproc) > /dev/null 2>&1
            make install > /dev/null 2>&1
            cd ..
            echo "✅ LIBOGG собран"
          else
            echo "⏭️ [1/10] LIBOGG пропущен (уже в кэше)"
          fi
          
          # ══════════════════════════════════════════════════════════════════
          # 2️⃣ OPUS - кодек для сжатия звука (аудио)
          # ══════════════════════════════════════════════════════════════════
          if [ ! -f "${{ env.INSTALL_DIR }}/lib/libopus.a" ]; then
            echo ""
            echo "📦 [2/10] Собираем OPUS (кодек звука)..."
            rm -rf opus
            git clone --depth 1 https://github.com/xiph/opus
            cd opus
            ./autogen.sh
            ./configure \
              --host=${{ env.OSXCROSS_HOST }} \
              --prefix=${{ env.INSTALL_DIR }} \
              --enable-static --disable-shared --disable-doc \
              CC=${{ env.OSXCROSS_HOST }}-clang \
              CFLAGS="-mmacosx-version-min=${{ env.MACOS_MIN_VER }}" \
              LDFLAGS="-mmacosx-version-min=${{ env.MACOS_MIN_VER }}" \
              > /dev/null 2>&1
            make -j$(nproc) > /dev/null 2>&1
            make install > /dev/null 2>&1
            cd ..
            echo "✅ OPUS собран"
          else
            echo "⏭️ [2/10] OPUS пропущен (уже в кэше)"
          fi
          
          # ══════════════════════════════════════════════════════════════════
          # 3️⃣ LIBVORBIS - кодек для звука (зависит от LIBOGG!)
          # ══════════════════════════════════════════════════════════════════
          if [ ! -f "${{ env.INSTALL_DIR }}/lib/libvorbis.a" ]; then
            echo ""
            echo "📦 [3/10] Собираем LIBVORBIS (звук OGG)..."
            rm -rf vorbis
            git clone --depth 1 https://github.com/xiph/vorbis vorbis
            cd vorbis
            ./autogen.sh
            ./configure \
              --host=${{ env.OSXCROSS_HOST }} \
              --prefix=${{ env.INSTALL_DIR }} \
              --enable-static --disable-shared --disable-docs \
              CC=${{ env.OSXCROSS_HOST }}-clang \
              CFLAGS="-mmacosx-version-min=${{ env.MACOS_MIN_VER }}" \
              LDFLAGS="-mmacosx-version-min=${{ env.MACOS_MIN_VER }}" \
              > /dev/null 2>&1
            make -j$(nproc) > /dev/null 2>&1
            make install > /dev/null 2>&1
            cd ..
            echo "✅ LIBVORBIS собран"
          else
            echo "⏭️ [3/10] LIBVORBIS пропущен (уже в кэше)"
          fi
          
          # ══════════════════════════════════════════════════════════════════
          # 4️⃣ LIBTHEORA - видео кодек (зависит от LIBOGG + LIBVORBIS!)
          # ══════════════════════════════════════════════════════════════════
          if [ ! -f "${{ env.INSTALL_DIR }}/lib/libtheora.a" ]; then
            echo ""
            echo "📦 [4/10] Собираем LIBTHEORA (видео кодек)..."
            rm -rf theora
            git clone --depth 1 https://github.com/xiph/theora theora
            cd theora
            ./autogen.sh
            ./configure \
              --host=${{ env.OSXCROSS_HOST }} \
              --prefix=${{ env.INSTALL_DIR }} \
              --enable-static --disable-shared --disable-examples \
              CC=${{ env.OSXCROSS_HOST }}-clang \
              CFLAGS="-mmacosx-version-min=${{ env.MACOS_MIN_VER }}" \
              LDFLAGS="-mmacosx-version-min=${{ env.MACOS_MIN_VER }}" \
              > /dev/null 2>&1
            make -j$(nproc) > /dev/null 2>&1
            make install > /dev/null 2>&1
            cd ..
            echo "✅ LIBTHEORA собран"
          else
            echo "⏭️ [4/10] LIBTHEORA пропущен (уже в кэше)"
          fi
          
          # ══════════════════════════════════════════════════════════════════
          # 5️⃣ LIBVPX - видео кодеки VP8/VP9 от Google
          #
          # КЛЮЧ УСПЕХА: используем правильный target для darwin
          # --target=x86_64-darwin вместо x86_64-darwin19-gcc
          # ══════════════════════════════════════════════════════════════════
          if [ ! -f "${{ env.INSTALL_DIR }}/lib/libvpx.a" ]; then
            echo ""
            echo "📦 [5/10] Собираем LIBVPX (VP8/VP9 видео)..."
            rm -rf libvpx
            git clone --depth 1 https://github.com/webmproject/libvpx libvpx
            cd libvpx
            
            # Правильная конфигурация для darwin (macOS)
            ./configure \
              --target=x86_64-darwin16-gcc \
              --prefix=${{ env.INSTALL_DIR }} \
              --enable-static --disable-shared \
              --disable-examples --disable-docs --disable-unit-tests \
              --disable-vp8 --enable-vp9 \
              --as=nasm \
              CROSS=${{ env.OSXCROSS_HOST }}- \
              CC=${{ env.OSXCROSS_HOST }}-clang \
              CXX=${{ env.OSXCROSS_HOST }}-clang++ \
              AR=${{ env.OSXCROSS_HOST }}-ar \
              LD=${{ env.OSXCROSS_HOST }}-ld \
              > /dev/null 2>&1
            
            make -j$(nproc) > /dev/null 2>&1
            make install > /dev/null 2>&1
            cd ..
            echo "✅ LIBVPX собран"
          else
            echo "⏭️ [5/10] LIBVPX пропущен (уже в кэше)"
          fi
          
          # ══════════════════════════════════════════════════════════════════
          # 6️⃣ LIBX264 - видео кодек H.264
          # ══════════════════════════════════════════════════════════════════
          if [ ! -f "${{ env.INSTALL_DIR }}/lib/libx264.a" ]; then
            echo ""
            echo "📦 [6/10] Собираем LIBX264 (H.264 видео)..."
            rm -rf x264
            git clone --depth 1 https://github.com/mirror/x264.git x264
            cd x264
            ./configure \
              --host=${{ env.OSXCROSS_HOST }} \
              --prefix=${{ env.INSTALL_DIR }} \
              --enable-static --disable-shared --disable-cli \
              --extra-cflags="-mmacosx-version-min=${{ env.MACOS_MIN_VER }}" \
              > /dev/null 2>&1
            make -j$(nproc) > /dev/null 2>&1
            make install > /dev/null 2>&1
            cd ..
            echo "✅ LIBX264 собран"
          else
            echo "⏭️ [6/10] LIBX264 пропущен (уже в кэше)"
          fi
          
          # ══════════════════════════════════════════════════════════════════
          # 7️⃣ LIBX265 - видео кодек H.265/HEVC
          #
          # КЛЮЧ: используем -DENABLE_CLI=OFF чтобы не собирать x265 программу
          # и --disable-shared чтобы не нужны были всякие связи
          # ══════════════════════════════════════════════════════════════════
          if [ ! -f "${{ env.INSTALL_DIR }}/lib/libx265.a" ]; then
            echo ""
            echo "📦 [7/10] Собираем LIBX265 (H.265 видео)..."
            rm -rf x265
            git clone --depth 1 https://github.com/videolan/x265.git x265
            cd x265/build/linux
            
            cmake -G "Unix Makefiles" \
              -DCMAKE_SYSTEM_NAME=Darwin \
              -DCMAKE_SYSTEM_PROCESSOR=x86_64 \
              -DCMAKE_TOOLCHAIN_FILE=${{ env.OSXCROSS_TARGET_DIR }}/toolchain.cmake \
              -DCMAKE_C_COMPILER=${{ env.OSXCROSS_HOST }}-clang \
              -DCMAKE_CXX_COMPILER=${{ env.OSXCROSS_HOST }}-clang++ \
              -DCMAKE_INSTALL_PREFIX=${{ env.INSTALL_DIR }} \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_OSX_DEPLOYMENT_TARGET=${{ env.MACOS_MIN_VER }} \
              -DENABLE_SHARED=OFF \
              -DENABLE_CLI=OFF \
              -DENABLE_TESTS=OFF \
              -DENABLE_LIBNUMA=OFF \
              ../../source > /dev/null 2>&1
            
            make -j$(nproc) > /dev/null 2>&1
            make install > /dev/null 2>&1
            cd ../../..
            echo "✅ LIBX265 собран"
          else
            echo "⏭️ [7/10] LIBX265 пропущен (уже в кэше)"
          fi
          
          # ══════════════════════════════════════════════════════════════════
          # 8️⃣ LIBFDK-AAC - кодек AAC для звука
          # ══════════════════════════════════════════════════════════════════
          if [ ! -f "${{ env.INSTALL_DIR }}/lib/libfdk-aac.a" ]; then
            echo ""
            echo "📦 [8/10] Собираем LIBFDK-AAC (AAC звук)..."
            rm -rf fdk-aac
            git clone --depth 1 https://github.com/mstorsjo/fdk-aac.git fdk-aac
            cd fdk-aac
            ./autogen.sh
            ./configure \
              --host=${{ env.OSXCROSS_HOST }} \
              --prefix=${{ env.INSTALL_DIR }} \
              --enable-static --disable-shared \
              CC=${{ env.OSXCROSS_HOST }}-clang \
              CFLAGS="-mmacosx-version-min=${{ env.MACOS_MIN_VER }}" \
              > /dev/null 2>&1
            make -j$(nproc) > /dev/null 2>&1
            make install > /dev/null 2>&1
            cd ..
            echo "✅ LIBFDK-AAC собран"
          else
            echo "⏭️ [8/10] LIBFDK-AAC пропущен (уже в кэше)"
          fi
          
          # ══════════════════════════════════════════════════════════════════
          # 9️⃣ SVT-AV1 - СУПЕР НОВЫЙ видео кодек!
          # ══════════════════════════════════════════════════════════════════
          if [ ! -f "${{ env.INSTALL_DIR }}/lib/libSvtAv1Enc.a" ]; then
            echo ""
            echo "📦 [9/10] Собираем SVT-AV1 (AV1 видео - БУДУЩЕЕ!)..."
            rm -rf SVT-AV1
            git clone --depth 1 https://gitlab.com/AOMediaCodec/SVT-AV1.git
            cd SVT-AV1
            rm -rf build && mkdir -p build
            
            cmake \
              -S . -B build \
              -DCMAKE_TOOLCHAIN_FILE=${{ env.OSXCROSS_TARGET_DIR }}/toolchain.cmake \
              -DOSXCROSS_SDK=${{ env.OSXCROSS_TARGET_DIR }}/SDK/MacOSX10.15.sdk \
              -DCMAKE_INSTALL_PREFIX=${{ env.INSTALL_DIR }} \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_OSX_DEPLOYMENT_TARGET=${{ env.MACOS_MIN_VER }} \
              -DCMAKE_OSX_ARCHITECTURES=x86_64 \
              -DCMAKE_ASM_NASM_COMPILER=nasm \
              -DCMAKE_ASM_NASM_FLAGS="-f macho64 -DPREFIX" \
              -DCMAKE_C_FLAGS="-mmacosx-version-min=${{ env.MACOS_MIN_VER }}" \
              -DCMAKE_CXX_FLAGS="-mmacosx-version-min=${{ env.MACOS_MIN_VER }}" \
              -DCMAKE_C_COMPILER=${{ env.OSXCROSS_HOST }}-clang \
              -DCMAKE_CXX_COMPILER=${{ env.OSXCROSS_HOST }}-clang++ \
              -DBUILD_SHARED_LIBS=OFF -DENABLE_TESTS=OFF \
              > /dev/null 2>&1
            
            cmake --build build -j$(nproc) > /dev/null 2>&1
            cmake --install build > /dev/null 2>&1
            cd ..
            echo "✅ SVT-AV1 собран"
          else
            echo "⏭️ [9/10] SVT-AV1 пропущен (уже в кэше)"
          fi
          
          # ══════════════════════════════════════════════════════════════════
          # 🔟 FLAC - аудио кодек без потерь
          # ══════════════════════════════════════════════════════════════════
          if [ ! -f "${{ env.INSTALL_DIR }}/lib/libFLAC.a" ]; then
            echo ""
            echo "📦 [10/10] Собираем LIBFLAC (FLAC аудио)..."
            rm -rf flac
            git clone --depth 1 https://github.com/xiph/flac.git flac
            cd flac
            ./autogen.sh
            ./configure \
              --host=${{ env.OSXCROSS_HOST }} \
              --prefix=${{ env.INSTALL_DIR }} \
              --enable-static --disable-shared --disable-cpp-libs \
              CC=${{ env.OSXCROSS_HOST }}-clang \
              CFLAGS="-mmacosx-version-min=${{ env.MACOS_MIN_VER }}" \
              > /dev/null 2>&1
            make -j$(nproc) > /dev/null 2>&1
            make install > /dev/null 2>&1
            cd ..
            echo "✅ LIBFLAC собран"
          else
            echo "⏭️ [10/10] LIBFLAC пропущен (уже в кэше)"
          fi
          
          echo ""
          echo "╔═════════════════════════════════════════════════════════════╗"
          echo "║       ✅ ВСЕ 10 БИБЛИОТЕК УСПЕШНО СОБРАНЫ ✅              ║"
          echo "╚═════════════════════════════════════════════════════════════╝"
          echo ""
          echo "📋 Список собранных библиотек:"
          ls -lh ${{ env.INSTALL_DIR }}/lib/*.a 2>/dev/null || echo "❌ Библиотеки не най��ены!"
          echo ""

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 6: Собираем FFMPEG со ВСЕМИ библиотеками
      # ════════════════════════════════════════════════════════════════════════
      - name: 🎬 Build FFmpeg with ALL Libraries
        run: |
          echo ""
          echo "╔═════════════════════════════════════════════════════════════╗"
          echo "║         🎬 НАЧИНАЕМ СБОРКУ FFMPEG 🎬                       ║"
          echo "╚═════════════════════════════════════════════════════════════╝"
          echo ""
          
          rm -rf ffmpeg-src
          git clone --depth 1 https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
          cd ffmpeg-src
          
          export PKG_CONFIG_PATH="${{ env.INSTALL_DIR }}/lib/pkgconfig"
          export PKG_CONFIG_LIBDIR="${{ env.INSTALL_DIR }}/lib/pkgconfig"
          
          echo "🔍 Проверяем pkg-config файлы:"
          if [ -d "${{ env.INSTALL_DIR }}/lib/pkgconfig/" ]; then
            echo "✅ PKG-CONFIG файлы найдены:"
            ls -1 ${{ env.INSTALL_DIR }}/lib/pkgconfig/ | head -15
          else
            echo "⚠️ PKG-CONFIG папка не найдена!"
          fi
          echo ""
          
          echo "⚙️ КОНФИГУРИРУЕМ FFMPEG..."
          echo "   (процесс может занять 2-3 минуты)"
          ./configure \
            --prefix="${{ github.workspace }}/dist_ffmpeg" \
            --enable-cross-compile \
            --cross-prefix=${{ env.OSXCROSS_HOST }}- \
            --target-os=darwin \
            --arch=x86_64 \
            --cc=${{ env.OSXCROSS_HOST }}-clang \
            --cxx=${{ env.OSXCROSS_HOST }}-clang++ \
            --ar=${{ env.OSXCROSS_HOST }}-ar \
            --ranlib=${{ env.OSXCROSS_HOST }}-ranlib \
            --strip=${{ env.OSXCROSS_HOST }}-strip \
            --pkg-config=pkg-config \
            --enable-static \
            --disable-shared \
            --enable-gpl \
            --enable-nonfree \
            --enable-libopus \
            --enable-libvorbis \
            --enable-libfdk-aac \
            --enable-libflac \
            --enable-libx264 \
            --enable-libx265 \
            --enable-libvpx \
            --enable-libtheora \
            --enable-libsvtav1 \
            --enable-filters \
            --enable-decoders \
            --enable-encoders \
            --enable-muxers \
            --enable-demuxers \
            --enable-postproc \
            --enable-avfilter \
            --enable-pthreads \
            --disable-doc \
            --disable-programs \
            --enable-ffmpeg \
            --extra-cflags="-I${{ env.INSTALL_DIR }}/include -mmacosx-version-min=${{ env.MACOS_MIN_VER }}" \
            --extra-ldflags="-L${{ env.INSTALL_DIR }}/lib -mmacosx-version-min=${{ env.MACOS_MIN_VER }}" \
            2>&1 | tail -50
          
          echo ""
          echo "🔨 КОМПИЛИРУЕМ FFMPEG"
          echo "   (это может занять 20-40 минут - берите кофе! ☕)"
          make -j$(nproc) V=1 2>&1 | tail -100
          
          echo ""
          echo "📥 УСТАНАВЛИВАЕМ FFMPEG..."
          make install
          
          if [ ! -f "${{ github.workspace }}/dist_ffmpeg/bin/ffmpeg" ]; then
            echo "❌ ОШИБКА: FFmpeg бинарь не создан!"
            exit 1
          fi
          
          echo ""
          echo "╔═════════════════════════════════════════════════════════════╗"
          echo "║    ✅✅✅ FFMPEG ПОЛНОФУНКЦИОНАЛЬНЫЙ ГОТОВ ✅✅✅          ║"
          echo "╚═════════════════════════════════════════════════════════════╝"
          echo ""
          echo "📋 ИНФОРМАЦИЯ О ФАЙЛЕ:"
          file ${{ github.workspace }}/dist_ffmpeg/bin/ffmpeg
          echo ""
          echo "📊 РАЗМЕР:"
          ls -lh ${{ github.workspace }}/dist_ffmpeg/bin/ffmpeg
          echo ""
          echo "🎉 ПОДДЕРЖИВАЕМЫЕ КОДЕКИ:"
          echo "   ✅ OPUS (audio)"
          echo "   ✅ AAC/FDK-AAC (audio)"
          echo "   ✅ FLAC (audio)"
          echo "   ✅ Vorbis (audio)"
          echo "   ✅ H.264 (video)"
          echo "   ✅ H.265/HEVC (video)"
          echo "   ✅ VP8/VP9 (video)"
          echo "   ✅ Theora (video)"
          echo "   ✅ AV1 (video)"
          echo ""

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 7: Сохраняем артефакт (готовый FFmpeg)
      # ════════════════════════════════════════════════════════════════════════
      - name: ⬆️ Upload Final Binary
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-high-sierra-full-complete
          path: dist_ffmpeg/bin/ffmpeg
          retention-days: 30

      # ════════════════════════════════════════════════════════════════════════
      # ШАГ 8: Debug информация при ошибке
      # ════════════════════════════════════════════════════════════════════════
      - name: 🔍 Debug Info
        if: failure()
        run: |
          echo ""
          echo "╔═════════════════════════════════════════════════════════════╗"
          echo "║          ❌ СБОРКА НЕ УДАЛАСЬ - DEBUG INFO ❌              ║"
          echo "╚═════════════════════════════════════════════════════════════╝"
          echo ""
          echo "PATH:"
          echo "$PATH"
          echo ""
          echo "КОМПИЛЯТОР:"
          which ${{ env.OSXCROSS_HOST }}-clang || echo "❌ Не найден"
          echo ""
          echo "БИБЛИОТЕКИ:"
          ls -la ${{ env.INSTALL_DIR }}/lib/ 2>/dev/null || echo "❌ Папка не найдена"
          echo ""
          echo "PKG-CONFIG:"
          ls -la ${{ env.INSTALL_DIR }}/lib/pkgconfig/ 2>/dev/null || echo "❌ Не найдена"
