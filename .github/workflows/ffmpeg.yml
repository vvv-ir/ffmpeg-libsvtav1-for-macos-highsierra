name: FFmpeg_HighSierra_Final_Fortress_v90
on: [push, workflow_dispatch]

env:
  CACHE_REV: "v90"
  OSXCROSS_ROOT: /home/runner/osxcross
  OSXCROSS_TARGET_DIR: /home/runner/osxcross/target
  INSTALL_DIR: ${{ github.workspace }}/deps_dist
  MACOS_MIN_VER: "10.13"
  MACOSX_DEPLOYMENT_TARGET: "10.13"
  SDK_VERSION: "10.15"
  # Эти две переменные — «сердце» osxcross. Без них всё падает.
  OSXCROSS_TARGET: "darwin19"
  OSXCROSS_HOST: "x86_64-apple-darwin19"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev uuid-dev libssl-dev libbz2-dev zlib1g-dev nasm yasm pkg-config make

      - name: Restore Osxcross Cache
        id: cache-osxcross
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.OSXCROSS_ROOT }}
          key: osxcross-${{ env.CACHE_REV }}-${{ env.SDK_VERSION }}

      - name: Setup Osxcross
        if: steps.cache-osxcross.outputs.cache-hit != 'true'
        run: |
          rm -rf ${{ env.OSXCROSS_ROOT }}
          git clone https://github.com/tpoechtrager/osxcross.git ${{ env.OSXCROSS_ROOT }}
          cd ${{ env.OSXCROSS_ROOT }}
          mkdir -p tarballs
          curl -L https://github.com/joseluisq/macosx-sdks/releases/download/${{ env.SDK_VERSION }}/MacOSX${{ env.SDK_VERSION }}.sdk.tar.xz -o tarballs/MacOSX${{ env.SDK_VERSION }}.sdk.tar.xz
          UNATTENDED=1 CC=clang CXX=clang++ ./build.sh

      - name: Save Osxcross Cache
        if: always() && steps.cache-osxcross.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.OSXCROSS_ROOT }}
          key: osxcross-${{ env.CACHE_REV }}-${{ env.SDK_VERSION }}

      # Добавляем бинарники osxcross в PATH один раз для всех шагов
      - name: Update PATH
        run: echo "${{ env.OSXCROSS_TARGET_DIR }}/bin" >> $GITHUB_PATH

      - name: Build Static Libraries
        run: |
          mkdir -p ${{ env.INSTALL_DIR }}
          
          # OPUS - Упрощенная конфигурация
          if [ ! -f "${{ env.INSTALL_DIR }}/lib/libopus.a" ]; then
            git clone --depth 1 https://github.com/xiph/opus
            cd opus && ./autogen.sh
            ./configure --host=${{ env.OSXCROSS_HOST }} --prefix=${{ env.INSTALL_DIR }} \
              --enable-static --disable-shared --disable-extra-programs --disable-doc \
              CC=${{ env.OSXCROSS_HOST }}-clang
            make -j$(nproc) install && cd ..
          fi

          # SVT-AV1 - Фикс через принудительный ассемблер
          if [ ! -f "${{ env.INSTALL_DIR }}/lib/libSvtAv1Enc.a" ]; then
            git clone --depth 1 https://gitlab.com/AOMediaCodec/SVT-AV1.git
            cd SVT-AV1
            # -DCMAKE_ASM_NASM_FLAGS форсирует macho64, игнорируя попытки CMake угадать формат
            cmake -S . -B build \
              -DCMAKE_TOOLCHAIN_FILE=${{ env.OSXCROSS_TARGET_DIR }}/toolchain.cmake \
              -DCMAKE_INSTALL_PREFIX=${{ env.INSTALL_DIR }} \
              -DCMAKE_OSX_DEPLOYMENT_TARGET=${{ env.MACOS_MIN_VER }} \
              -DCMAKE_ASM_NASM_COMPILER=nasm \
              -DCMAKE_ASM_NASM_FLAGS="-f macho64" \
              -DBUILD_SHARED_LIBS=OFF -DENABLE_TESTS=OFF -DENABLE_EXAMPLES=OFF
            cmake --build build -j$(nproc) --target install
            cd ..
          fi

      - name: Build FFmpeg
        run: |
          git clone --depth 1 https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
          cd ffmpeg-src
          export PKG_CONFIG_LIBDIR="${{ env.INSTALL_DIR }}/lib/pkgconfig"
          ./configure \
            --prefix="${{ github.workspace }}/dist_ffmpeg" \
            --enable-cross-compile \
            --cross-prefix=${{ env.OSXCROSS_HOST }}- \
            --target-os=darwin --arch=x86_64 \
            --cc=${{ env.OSXCROSS_HOST }}-clang \
            --pkg-config=pkg-config --enable-static --disable-shared \
            --enable-gpl --enable-nonfree --enable-libopus --enable-libsvtav1 \
            --extra-cflags="-I${{ env.INSTALL_DIR }}/include" \
            --extra-ldflags="-L${{ env.INSTALL_DIR }}/lib" \
            --disable-doc
          make -j$(nproc)
          make install

      - name: Upload Final Binary
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-high-sierra-v90
          path: dist_ffmpeg/bin/ffmpeg
