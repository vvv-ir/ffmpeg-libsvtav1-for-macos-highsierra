- name: Configure and Build FFmpeg
        run: |
          cd ffmpeg-src
          # Добавляем пути к Homebrew (на Intel и ARM маках они разные, учитываем оба)
          export PKG_CONFIG_PATH="$GITHUB_WORKSPACE/libs/lib/pkgconfig:/usr/local/lib/pkgconfig:/opt/homebrew/lib/pkgconfig"
          
          ./configure \
            --prefix="$GITHUB_WORKSPACE/dist" \
            --enable-static \
            --disable-shared \
            --enable-gpl \
            --enable-nonfree \
            --enable-libass \
            --enable-libmp3lame \
            --enable-libopus \
            --enable-libvorbis \
            --enable-libvpx \
            --enable-libx264 \
            --enable-libx265 \
            --enable-libsvtav1 \
            --arch=x86_64 \
            --target-os=darwin \
            --extra-cflags="-mmacosx-version-min=10.13 -arch x86_64 -I$GITHUB_WORKSPACE/libs/include -I/usr/local/include -I/opt/homebrew/include" \
            --extra-ldflags="-mmacosx-version-min=10.13 -arch x86_64 -L$GITHUB_WORKSPACE/libs/lib -L/usr/local/lib -L/opt/homebrew/lib"
          
          make -j$(sysctl -n hw.ncpu)
          make install
